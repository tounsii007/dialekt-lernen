# Dialekto · Stack-Orchestrierung (Frontend + Backend + PostgreSQL).
# Alle Ports, Replikate und Zugangsdaten sind über die .env steuerbar
# (Vorlage: .env.example). Bewusst NICHT die Standard-Ports.
#
#   cp .env.example .env  &&  docker compose up -d --build
#
# Öffentlich erreichbar ist nur das Frontend (nginx) auf FRONTEND_PORT; nginx
# leitet /api intern an die — beliebig vielen — Backend-Replikate weiter
# (Round-Robin). Backend und Datenbank haben keinen Host-Port.

services:
  postgres:
    image: postgres:17-alpine
    command: ["-p", "${POSTGRES_PORT:-6432}"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dialekto}
      POSTGRES_USER: ${POSTGRES_USER:-dialekto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dialekto}
    volumes:
      - dialekto-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dialekto} -d ${POSTGRES_DB:-dialekto} -p ${POSTGRES_PORT:-6432}"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped
    networks: [dialekto-net]

  backend:
    build: ./backend
    environment:
      DB_URL: "jdbc:postgresql://postgres:${POSTGRES_PORT:-6432}/${POSTGRES_DB:-dialekto}"
      DB_USER: ${POSTGRES_USER:-dialekto}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dialekto}
      SERVER_PORT: ${BACKEND_PORT:-9090}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8973}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
    expose:
      - "${BACKEND_PORT:-9090}"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      replicas: ${BACKEND_REPLICAS:-2}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${BACKEND_PORT:-9090}/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 4s
      retries: 12
      start_period: 45s
    restart: unless-stopped
    networks: [dialekto-net]

  frontend:
    build: .
    environment:
      NGINX_PORT: ${NGINX_PORT:-8080}
      BACKEND_HOST: backend
      BACKEND_PORT: ${BACKEND_PORT:-9090}
    ports:
      - "${FRONTEND_PORT:-8973}:${NGINX_PORT:-8080}"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks: [dialekto-net]

volumes:
  dialekto-pgdata:

networks:
  dialekto-net:
    driver: bridge
