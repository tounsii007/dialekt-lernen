services:
  postgres:
    image: postgres:17-alpine
    container_name: dialekto-postgres
    environment:
      POSTGRES_DB: dialekto
      POSTGRES_USER: dialekto
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dialekto}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - dialekto-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dialekto -d dialekto"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dialekto-pgdata:
