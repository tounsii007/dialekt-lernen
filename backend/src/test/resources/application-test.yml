spring:
  datasource:
    url: jdbc:h2:mem:dialekto;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop      # Schema aus Entities (Flyway-SQL ist Postgres-spezifisch)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
