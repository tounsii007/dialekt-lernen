spring:
  application:
    name: dialekto-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dialekto}
    username: ${DB_USER:dialekto}
    password: ${DB_PASSWORD:dialekto}
  jpa:
    hibernate:
      ddl-auto: validate          # Schema wird von Flyway verwaltet, nicht von Hibernate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework   # X-Forwarded-* hinter Reverse-Proxy (nginx) respektieren
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false
  shutdown: graceful

# Origins, die das Frontend bedienen darf (CORS). Komma-getrennt überschreibbar.
dialekto:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.dialekto: ${LOG_LEVEL:INFO}      # eigene App (per LOG_LEVEL überschreibbar, z.B. DEBUG)
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{32} - %msg%n"
