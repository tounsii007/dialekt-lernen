name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax-check:
    name: Syntax & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Parse-check all ES modules with node --check
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            if ! node --check "$f"; then
              echo "::error file=$f::Syntax error"
              fail=1
            fi
          done < <(find data js -name '*.js' -print0)
          exit $fail

      - name: Validate JSON files
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf-8'))"; then
              echo "::error file=$f::Invalid JSON"
              fail=1
            fi
          done < <(find . -name '*.json' -not -path './node_modules/*' -print0)
          exit $fail

      - name: HTML syntax check (html-validate)
        run: npx --yes html-validate index.html

  validate-data:
    name: Validate Dialect Datasets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate dialect data (schema, duplicates, plausibility)
        run: node tools/validate.mjs

  unit-tests:
    name: Unit + Integration + Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run all tests with coverage
        run: node tools/test.mjs --coverage

      - name: Run integration tests separately (for visibility)
        run: node tools/test.mjs --filter=integration

      - name: Run frontend tests separately (for visibility)
        run: node tools/test.mjs --filter=frontend

  smoke-test:
    name: Static-Serve Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Serve + curl smoke
        run: |
          npx --yes http-server . -p 5173 &
          server_pid=$!
          sleep 3
          # Index must serve a 200 with the expected title
          curl -fsS http://localhost:5173/ | grep -q 'Dialekto' || (echo "Index missing 'Dialekto'"; exit 1)
          # data/dialekte.js must serve a 200 (no 404 from broken paths)
          curl -fsS http://localhost:5173/data/dialekte.js > /dev/null
          # Service Worker must be present
          curl -fsS http://localhost:5173/sw.js | grep -q 'PRECACHE_URLS' || (echo "SW missing precache"; exit 1)
          # Manifest must be valid JSON
          curl -fsS http://localhost:5173/manifest.webmanifest | node -e "JSON.parse(require('fs').readFileSync(0,'utf-8'))"
          kill $server_pid

  security-scan:
    name: Security & Quality Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for accidentally committed secrets
        run: |
          # Sehr leichter Sekret-Check (echte Tools wie gitleaks wären besser)
          if grep -rIE '(api[_-]?key|secret|password|token)["'\''=:]{1,3}[A-Za-z0-9]{20,}' \
              --include='*.js' --include='*.json' --include='*.md' \
              --exclude-dir=node_modules --exclude-dir=.git . ; then
            echo "::warning::Possible secret-like patterns found — please review"
          fi

      - name: Check for console.log in production code (allowed in tools/, tests/)
        run: |
          # console.log only allowed in tools/, tests/, and js/util/network.js (warns appropriately)
          violations=$(grep -rn 'console\.log' js/ --include='*.js' | grep -v 'tools/' | grep -v 'tests/' || true)
          if [ -n "$violations" ]; then
            echo "::warning::console.log in production code:"
            echo "$violations"
          fi
