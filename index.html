<!DOCTYPE html>
<html lang="de" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="description" content="Lerne deutsche Dialekte – Hessisch, Berlinisch, Bayerisch, Kölsch, Sächsisch, Plattdeutsch und mehr." />
  <title>Dialekto · Deutsche Dialekte lernen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&display=swap" rel="stylesheet" /></noscript>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%238b5cf6'/%3E%3Ctext y='75' x='50' text-anchor='middle' font-size='60' fill='white'%3E%F0%9F%97%A3%EF%B8%8F%3C/text%3E%3C/svg%3E" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%97%A3%EF%B8%8F%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <a class="skip-link" href="#app">Zum Inhalt springen</a>
  <div class="bg-stack" aria-hidden="true">
    <div class="bg-aurora">
      <div class="aurora-band b1"></div>
      <div class="aurora-band b2"></div>
      <div class="aurora-band b3"></div>
    </div>
    <div class="bg-orbs">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>
    <div class="bg-grain"></div>
    <div class="bg-vignette"></div>
  </div>
  <div class="scroll-progress" aria-hidden="true"></div>

  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="#/" data-route="home">
        <span class="brand-logo" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="28" height="28">
            <defs>
              <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="currentColor" stop-opacity="1" />
                <stop offset="100%" stop-color="currentColor" stop-opacity=".55" />
              </linearGradient>
            </defs>
            <path fill="url(#lg)" d="M16 3C9 3 3 8 3 15c0 4 2 7.5 5.5 9.5L7 30l6-3.2c1 .2 2 .2 3 .2 7 0 13-5 13-12S23 3 16 3Z"/>
            <circle cx="11" cy="15" r="1.6" fill="#fff"/>
            <circle cx="16" cy="15" r="1.6" fill="#fff"/>
            <circle cx="21" cy="15" r="1.6" fill="#fff"/>
          </svg>
        </span>
        <span class="brand-text">
          <span class="brand-name">Dialekto</span>
          <span class="brand-sub">Deutsche Dialekte lernen</span>
        </span>
      </a>

      <nav class="nav" aria-label="Hauptnavigation">
        <a href="#/" data-route="home" class="nav-link"><span>Start</span></a>
        <a href="#/entdecken" data-route="entdecken" class="nav-link"><span>Entdecken</span></a>
        <a href="#/lernen" data-route="lernen" class="nav-link"><span>Lernen</span></a>
        <a href="#/quiz" data-route="quiz" class="nav-link"><span>Quiz</span></a>
        <a href="#/vergleich" data-route="vergleich" class="nav-link"><span>Vergleich</span></a>
        <a href="#/favoriten" data-route="favoriten" class="nav-link"><span>Favoriten</span></a>
      </nav>

      <div class="topbar-actions">
        <button id="searchOpen" class="search-trigger" aria-label="Suchen" title="Suchen (S)">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <span class="search-trigger-text">Suchen oder springen…</span>
          <kbd class="kbd search-trigger-kbd">S</kbd>
        </button>
        <button id="paletteToggle" class="icon-btn palette-toggle" aria-label="Farbpalette wählen" title="Farbpalette">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="1.5"/><circle cx="17.5" cy="10.5" r="1.5"/><circle cx="8.5" cy="7.5" r="1.5"/><circle cx="6.5" cy="12.5" r="1.5"/><path d="M12 22a10 10 0 0 1 0-20 9 9 0 0 1 9 9c0 2.5-2 4-4 4h-2a2 2 0 0 0-1.4 3.4A1.7 1.7 0 0 1 12 22z"/></svg>
        </button>
        <button id="soundToggle" class="icon-btn sound-toggle" aria-label="Sounds ein/aus" title="Sounds (M)">
          <svg class="icon-sound-on" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4z"/><path d="M16 9a4 4 0 0 1 0 6"/><path d="M19 6a8 8 0 0 1 0 12"/></svg>
          <svg class="icon-sound-off" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>
        </button>
        <button id="themeToggle" class="icon-btn theme-toggle" aria-label="Design wechseln" title="Hell/Dunkel umschalten">
          <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>

      <button id="menuToggle" class="icon-btn menu-toggle" aria-label="Menü">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </header>

  <main id="app" class="app" tabindex="-1" aria-live="polite" aria-busy="false">
    <!-- Views werden hier dynamisch gerendert -->
  </main>
  <div id="routeAnnouncer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  <!-- Command palette overlay -->
  <div id="searchOverlay" class="search-overlay cmdp-overlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="search-panel cmdp-panel">
      <div class="search-input-row cmdp-input-row">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="searchInput" type="search" placeholder="Aktion, Dialekt oder Ausdruck…" autocomplete="off" />
        <kbd class="kbd">Esc</kbd>
      </div>
      <div id="searchResults" class="search-results cmdp-results" aria-live="polite"></div>
      <div class="cmdp-footer">
        <span><kbd class="kbd">↑</kbd><kbd class="kbd">↓</kbd> navigieren</span>
        <span><kbd class="kbd">↵</kbd> öffnen</span>
        <span><kbd class="kbd">esc</kbd> schließen</span>
        <span class="cmdp-footer-brand">Dialekto · Kommando-Palette</span>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <footer class="footer">
    <div class="footer-inner">
      <span>Dialekto · Mit ♥ für die deutsche Sprachvielfalt</span>
      <span class="footer-meta">v1.0 · Erweiterbar · <button id="addDialectHint" class="link-btn">Eigenen Dialekt hinzufügen?</button> · <button id="restartTour" class="link-btn">Tour starten</button></span>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
